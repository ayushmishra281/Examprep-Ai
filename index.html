<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamPrep AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#4f46e5,#06b6d4,#22c55e);color:white;text-align:center;transition:0.3s}
.dark{background:#111;color:#fff}
.container{max-width:900px;margin:auto;padding:15px}
.card{background:white;color:#111;padding:20px;border-radius:18px;margin:15px 0}
.dark .card{background:#222;color:#fff}
input,select,button,textarea{width:90%;padding:12px;margin:8px;border-radius:10px}
button{background:#4f46e5;color:white;border:none}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>🚀 AYUSH MISHRA</h1>
<h2>ExamPrep AI</h2>
<button onclick="toggleDark()">Dark Mode</button>
<p id="quote"></p>
</div>

<div class="card">
<h2>Login</h2>
<input id="name" placeholder="Enter name">
<select id="exam"><option>IPMAT</option><option>CLAT</option><option>JEE</option><option>NEET</option></select>
<button onclick="login()">Start</button>
<p id="welcome"></p>
</div>

<div class="card">
<h2>Subject-wise Tracker</h2>
<input id="quant" type="number" placeholder="Quant %">
<input id="verbal" type="number" placeholder="Verbal %">
<input id="lr" type="number" placeholder="LR %">
<button onclick="track()">Analyze</button>
<p id="analysis"></p>
<p id="weak"></p>
</div>

<div class="card">
<h2>To-do List</h2>
<textarea id="todo"></textarea>
<button onclick="saveTodo()">Save</button>
</div>

<div class="card">
<h2>Notes</h2>
<textarea id="notes"></textarea>
<button onclick="saveNotes()">Save</button>
</div>

<div class="card">
<h2>Performance Graph</h2>
<canvas id="chart"></canvas>
</div>
</div>

<script>
const quotes=["Success comes from consistency","Study smart not just hard","Small progress is progress"];
document.getElementById("quote").innerText=quotes[Math.floor(Math.random()*quotes.length)];

function toggleDark(){document.body.classList.toggle("dark")}
function login(){
 let name=document.getElementById("name").value||"Student";
 let exam=document.getElementById("exam").value;
 document.getElementById("welcome").innerText="Welcome "+name+" | Target "+exam;
}
function track(){
 let q=+document.getElementById("quant").value||0;
 let v=+document.getElementById("verbal").value||0;
 let l=+document.getElementById("lr").value||0;
 let avg=Math.round((q+v+l)/3);
 let weak=Math.min(q,v,l)==q?"Quant":Math.min(q,v,l)==v?"Verbal":"LR";
 document.getElementById("analysis").innerText="Readiness Score: "+avg+"/100";
 document.getElementById("weak").innerText="Weak Subject: "+weak;
 new Chart(document.getElementById("chart"),{
   type:'bar',
   data:{labels:["Quant","Verbal","LR"],datasets:[{data:[q,v,l]}]}
 });
}
function saveTodo(){localStorage.setItem("todo",document.getElementById("todo").value)}
function saveNotes(){localStorage.setItem("notes",document.getElementById("notes").value)}
window.onload=()=>{
 document.getElementById("todo").value=localStorage.getItem("todo")||"";
 document.getElementById("notes").value=localStorage.getItem("notes")||"";
}
</script>
</body>
</html>
