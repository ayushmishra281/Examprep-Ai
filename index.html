<!DOCTYPE html>
<html>
<head>
  <title>ExamPrep AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; background:#f4f7ff; text-align:center; padding:20px; }
    .box { background:white; padding:20px; border-radius:15px; box-shadow:0 0 10px #ccc; max-width:500px; margin:auto; }
    h1 { color:#2c3e50; }
    input, button { padding:10px; margin:10px; width:80%; border-radius:10px; border:1px solid #ccc; }
    button { background:#4CAF50; color:white; border:none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>📚 ExamPrep AI</h1>
    <p>Created by Ayush Mishra</p>
    <p>Track your exam preparation progress</p>
    <input type="text" placeholder="Enter exam name">
    <input type="number" placeholder="Syllabus completed %">
    <button onclick="alert('Progress saved!')">Save Progress</button>
  </div>
</body>
</html>
