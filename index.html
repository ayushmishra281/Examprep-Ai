<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ExamPrep AI</title>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#4f46e5,#06b6d4);color:white;text-align:center}
.box{background:white;color:#111;margin:15px auto;padding:20px;border-radius:20px;max-width:600px;box-shadow:0 4px 15px rgba(0,0,0,.2)}
input,select,button{width:90%;padding:12px;margin:8px;border-radius:10px;border:1px solid #ccc}
button{background:#4f46e5;color:white;border:none}
.hidden{display:none}
.progress{background:#ddd;border-radius:10px;width:90%;margin:auto}
.bar{height:20px;background:#10b981;width:0%;border-radius:10px}
h1{font-size:38px}
</style>
</head>
<body>

<h1>🚀 AYUSH MISHRA</h1>
<p>ExamPrep AI</p>

<div class="box">
  <h2>Select Exam</h2>
  <select id="exam">
    <option>JEE Main</option><option>NEET</option><option>CLAT</option><option>IPMAT</option><option>UPSC</option>
  </select>
  <input type="date" id="examdate">
  <button onclick="showCountdown()">Set Countdown</button>
  <p id="count"></p>
</div>

<div class="box">
  <h2>Syllabus Tracker</h2>
  <input type="number" id="total" placeholder="Total chapters">
  <input type="number" id="done" placeholder="Completed chapters">
  <button onclick="calc()">Calculate</button>
  <p id="percent"></p>
  <div class="progress"><div class="bar" id="bar"></div></div>
</div>

<div class="box">
  <h2>Your Planner</h2>
  <input type="number" id="hours" placeholder="Study hours per day">
  <button onclick="plan()">Analyze Planner</button>
  <p id="planres"></p>
</div>

<div class="box">
  <h2>AI Doubt Assistant</h2>
  <input type="text" id="q" placeholder="Ask anything">
  <button onclick="ask()">Ask</button>
  <p id="ans"></p>
</div>

<script>
function showCountdown(){
 let d=new Date(document.getElementById("examdate").value);
 let now=new Date();
 let diff=Math.ceil((d-now)/(1000*60*60*24));
 document.getElementById("count").innerText="⏳ "+diff+" days left";
}
function calc(){
 let t=parseInt(document.getElementById("total").value)||0;
 let d=parseInt(document.getElementById("done").value)||0;
 let p=t?Math.round((d/t)*100):0;
 document.getElementById("percent").innerText="Syllabus completed: "+p+"%";
 document.getElementById("bar").style.width=p+"%";
}
function plan(){
 let h=parseInt(document.getElementById("hours").value)||0;
 let p=document.getElementById("percent").innerText.match(/\d+/);
 let per=p?parseInt(p[0]):0;
 let msg=(h>=6 && per>=70)?"✅ Is planner se exam crack kar sakte ho":"⚠️ Study aur badhani hogi";
 document.getElementById("planres").innerText=msg;
}
function ask(){
 let q=document.getElementById("q").value.toLowerCase();
 document.getElementById("ans").innerText=q.includes("who created you")?"I was created by Ayush Mishra.":"Daily practice + PYQs solve karo.";
}
</script>
</body>
</html>
